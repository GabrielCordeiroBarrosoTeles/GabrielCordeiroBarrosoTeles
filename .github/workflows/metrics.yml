name: Metrics

# Substitui os cards do github-readme-stats/streak-stats (instâncias públicas
# compartilhadas que ficam sem ar / retornam erro por rate limit da API do GitHub).
# lowlighter/metrics roda com o SEU token, gera o SVG e comita direto no repo —
# sem depender de servidor de terceiro em tempo de visualização.
#
# Setup necessário (não dá pra automatizar, é passo manual na tua conta):
# 1. Criar um Personal Access Token em github.com/settings/tokens (classic,
#    sem escopos extras é suficiente para dados públicos)
# 2. Settings > Secrets and variables > Actions > New repository secret
#    Nome: METRICS_TOKEN | Valor: o token criado acima

on:
  schedule:
    - cron: "0 6 * * *" # todo dia às 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GabrielCordeiroBarrosoTeles
          filename: metrics.svg
          template: classic

          # substitui o card de stats + top-langs
          plugin_languages: yes
          plugin_languages_limit: 8

          # substitui o streak-stats (calendário isométrico de contribuições)
          plugin_isocalendar: yes
